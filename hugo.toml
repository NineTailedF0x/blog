baseURL = "https://blog.ninetailedf0x.com/"
languageCode = "en-us"
title = "NineTailedF0x Security Blog"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
pygmentsUseClasses = true

[minify]
  disableXML = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "NineTailedF0x"
  description = "Webapp pentesting and cybersec stuff"
  keywords = ["security", "pentesting", "web application security", "cybersecurity"]
  author = "NineTailedF0x"
  DateFormat = "2006-01-02"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  comments = true
  hidemeta = false

  # Cusdis (privacy-friendly, nickname-only comments — no login required)
  # Create a project at https://cusdis.com/dashboard and paste its App ID below.
  cusdisAppId = "43e8009d-d594-496d-bbcb-0f29c863d495"
  cusdisHost = "https://cusdis.com"

  [params.label]
    text = "NineTailedF0x"
    icon = "img/avatar.png"
    iconHeight = 34

  [params.assets]
    favicon = "img/avatar.png"
    favicon16x16 = "img/avatar.png"
    favicon32x32 = "img/avatar.png"
    apple_touch_icon = "img/avatar.png"

  [params.homeInfoParams]
    Title = "I'm <a href=\"/cv/\" class=\"fox-name\">NineTailedF0x</a> <br>And I break web apps for a living"
    Content = "Nine tails, one fox, zero patience for bad input validation. Dont expect regular posts, and dont expect them to always be serious — just security blogposts and random tech thoughts, *whenever the mood strikes*."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/NineTailedF0x"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/yehor-ulianov/"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:Nin3TailedF0x@protonmail.com"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[[menu.main]]
  name = "posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  name = "cv"
  url = "/cv/"
  weight = 20

[[menu.main]]
  name = "tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  name = "search"
  url = "/search/"
  weight = 40

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true
